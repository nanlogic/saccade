<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saccade Issue Draft Fixture</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 32px;
      color: #1f2937;
      background: #f8fafc;
    }

    main {
      max-width: 780px;
      background: white;
      border: 1px solid #d7dde8;
      padding: 24px;
    }

    input,
    textarea {
      display: block;
      box-sizing: border-box;
      width: 100%;
      margin: 8px 0 16px;
      padding: 10px;
      font: inherit;
    }

    textarea {
      min-height: 180px;
    }

    aside {
      margin-top: 32px;
      max-width: 360px;
    }
  </style>
</head>
<body data-session-revision="0">
  <main>
    <h1>New issue</h1>
    <p>The agent may draft title and body only. The human owns submit.</p>

    <form id="issue-form">
      <label for="issue-title">Issue title</label>
      <input id="issue-title" name="title" type="text" placeholder="Title" autocomplete="off">

      <label for="issue-body">Issue body</label>
      <textarea id="issue-body" name="body" placeholder="Describe the issue" autocomplete="off"></textarea>

      <label for="account-password">Password stays human-only</label>
      <input id="account-password" name="password" type="password" value="">

      <button id="submit-issue" type="submit">Create issue</button>
    </form>

    <pre id="events" aria-live="polite">submit_attempted=false</pre>
  </main>

  <aside>
    <label for="site-search">Search issues</label>
    <input id="site-search" name="q" type="search" placeholder="Search" autocomplete="off">
  </aside>

  <script>
    const form = document.getElementById("issue-form");
    const events = document.getElementById("events");
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      document.body.dataset.submitAttempted = "true";
      events.textContent = "submit_attempted=true";
    });
  </script>
</body>
</html>
