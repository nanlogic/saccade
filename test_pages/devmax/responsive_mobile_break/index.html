<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="devmax:expected" content="responsive_mobile_break">
  <title>Responsive Mobile Break</title>
  <style>
    .wide-table { min-width: 980px; }
  </style>
</head>
<body>
  <main data-devmax-responsive-break>
    <h1>Mobile Dashboard</h1>
    <div class="wide-table">This fixed-width table overflows small screens.</div>
  </main>
</body>
</html>
