<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="devmax:expected" content="duplicate_id_controls">
  <title>Duplicate ID Controls</title>
</head>
<body>
  <main data-devmax-duplicate-id>
    <h1>Filters</h1>
    <label for="status">Primary status</label>
    <select id="status" name="primary_status">
      <option>Open</option>
      <option>Closed</option>
    </select>
    <label for="status">Secondary status</label>
    <select id="status" name="secondary_status">
      <option>Ready</option>
      <option>Blocked</option>
    </select>
  </main>
</body>
</html>
