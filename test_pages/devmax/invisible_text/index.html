<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="devmax:expected" content="invisible_text">
  <title>Invisible Text</title>
  <style>
    .ghost { color: white; background: white; }
  </style>
</head>
<body>
  <main>
    <h1>Invoice</h1>
    <button class="ghost" data-devmax-invisible-text type="button">Submit</button>
    <p id="status">idle</p>
  </main>
  <script>
    document.querySelector("button").addEventListener("click", () => {
      document.getElementById("status").textContent = "submitted";
    });
  </script>
</body>
</html>
