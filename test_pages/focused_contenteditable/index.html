<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focused Contenteditable Fixture</title>
    <style>
      body {
        margin: 0;
        background: #f6f7f9;
        color: #101418;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 64px;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 18px;
        font-weight: 650;
      }

      [contenteditable="true"] {
        box-sizing: border-box;
        width: 560px;
        min-height: 180px;
        border: 2px solid #6b7280;
        border-radius: 6px;
        padding: 12px;
        background: #ffffff;
        color: #111827;
        font: 18px/1.45 ui-monospace, "SFMono-Regular", Consolas, monospace;
        white-space: pre-wrap;
      }

      [contenteditable="true"]:focus {
        border-color: #1668e3;
        outline: 3px solid rgba(22, 104, 227, 0.25);
      }

      output {
        display: block;
        margin-top: 16px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="editor">Human-focused contenteditable editor</label>
      <div
        id="editor"
        role="textbox"
        aria-label="Draft body editor"
        contenteditable="true"
        spellcheck="false"
      ></div>
      <output id="status">Ready</output>
    </main>
    <script>
      (() => {
        const editor = document.getElementById("editor");
        const status = document.getElementById("status");
        const state = { inputEvents: 0 };

        editor.addEventListener("input", () => {
          state.inputEvents += 1;
          status.textContent = `Length ${editor.textContent.length}`;
        });
        window.__FOCUSED_CONTENTEDITABLE = state;
        window.addEventListener("load", () => {
          editor.focus();
          const range = document.createRange();
          range.selectNodeContents(editor);
          range.collapse(false);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        });
      })();
    </script>
  </body>
</html>
