<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focused Sensitive Fixture</title>
    <style>
      body {
        margin: 0;
        background: #f6f7f9;
        color: #101418;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 64px;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 18px;
        font-weight: 650;
      }

      input {
        box-sizing: border-box;
        width: 420px;
        height: 48px;
        border: 2px solid #6b7280;
        border-radius: 6px;
        padding: 8px 12px;
        background: #ffffff;
        color: #111827;
        font-size: 20px;
      }

      input:focus {
        border-color: #1668e3;
        outline: 3px solid rgba(22, 104, 227, 0.25);
      }
    </style>
  </head>
  <body>
    <main>
      <label for="account-password">Account password</label>
      <input id="account-password" name="password" type="password" autocomplete="current-password">
    </main>
    <script>
      window.addEventListener("load", () => {
        document.getElementById("account-password").focus();
      });
    </script>
  </body>
</html>
