<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Reused Target Reflex Regression</title>
    <link rel="stylesheet" href="../selftest.css">
    <style>
      #sensitive-fixture {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        display: flex;
        gap: 8px;
      }

      #sensitive-fixture input {
        width: 180px;
      }
    </style>
  </head>
  <body>
    <div id="arena"></div>
    <pre id="truth">hits=0 misses=0 spawned=0 finished=false</pre>
    <div id="sensitive-fixture" aria-label="Human sensitive fields">
      <input id="ssn" name="ssn" data-sensitive="ssn" value="123-45-6789">
      <input id="password" name="password" type="password" value="correct-horse-battery">
    </div>
    <script src="../selftest_targets.js"></script>
    <script>
      const requestedCount = Number(new URLSearchParams(location.search).get("count") || 30);
      SaccadeSelftest.domReusedTarget({count: Math.max(1, requestedCount)});
    </script>
  </body>
</html>
