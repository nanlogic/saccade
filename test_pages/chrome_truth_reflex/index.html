<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Truth Reflex POC</title>
    <link rel="stylesheet" href="../selftest.css">
    <style>
      #reflex-start {
        position: absolute;
        left: 600px;
        top: 360px;
        z-index: 20;
      }

      .delayed-target {
        animation: delayed-target-reveal 1ms step-end 64ms forwards;
        visibility: hidden;
      }

      @keyframes delayed-target-reveal {
        to { visibility: visible; }
      }

      #sensitive-fixture {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        display: flex;
        gap: 8px;
      }

      #sensitive-fixture input {
        width: 180px;
      }
    </style>
  </head>
  <body>
    <button id="reflex-start" type="button">START</button>
    <div id="arena"></div>
    <pre id="truth">hits=0 misses=0 spawned=0 finished=false</pre>
    <div id="sensitive-fixture" aria-label="Human sensitive fields">
      <input id="ssn" name="ssn" data-sensitive="ssn" value="123-45-6789">
      <input id="password" name="password" type="password" value="correct-horse-battery">
    </div>
    <script src="../selftest_targets.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const requestedCount = Number(params.get("count") || 30);
      SaccadeSelftest.domTargets({
        count: Math.max(1, requestedCount),
        delayed: params.get("delayed") === "1",
      });
      const startReflex = window.__saccadeStart;
      window.__saccadeStart = () => {
        document.getElementById("reflex-start")?.remove();
        startReflex();
      };
      document.getElementById("reflex-start").addEventListener("mousedown", () => {
        window.__saccadeStart();
      });
    </script>
  </body>
</html>
