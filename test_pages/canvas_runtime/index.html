<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Saccade Canvas Runtime Reductions</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef8f3;
        color: #17353b;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      .shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 360px;
        background:
          radial-gradient(circle at 32% 24%, rgba(252, 211, 77, 0.24), transparent 32%),
          radial-gradient(circle at 76% 22%, rgba(244, 114, 182, 0.22), transparent 30%),
          linear-gradient(135deg, #ecfdf5, #eff6ff);
      }

      .shell.small {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
      }

      .shell.full canvas {
        width: 100%;
        height: 100%;
      }

      .shell.small canvas {
        width: 720px;
        height: 420px;
        border: 1px solid rgba(15, 23, 42, 0.18);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
      }

      .shell.small.bare canvas {
        border: 0;
        box-shadow: none;
      }

      .shell.small canvas.attribute-sized {
        width: auto;
        height: auto;
      }

      .hud {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 10px;
        align-items: center;
        pointer-events: none;
      }

      .hud.visible {
        display: flex;
      }

      .tile {
        min-width: 92px;
        border: 1px solid rgba(23, 53, 59, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 12px 28px rgba(34, 60, 72, 0.12);
        padding: 8px 12px;
      }

      .tile span {
        display: block;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0;
        color: #64748b;
      }

      .tile strong {
        display: block;
        margin-top: 2px;
        font-size: 24px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <canvas id="game"></canvas>
      <section id="hud" class="hud" aria-label="Canvas reduction status">
        <div class="tile"><span>VARIANT</span><strong id="variantLabel">static</strong></div>
        <div class="tile"><span>FRAME</span><strong id="frameLabel">0</strong></div>
        <div class="tile"><span>DPR</span><strong id="dprLabel">1</strong></div>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const variant = params.get("variant") || "static";
      const config = configForVariant(variant);
      const shell = document.querySelector(".shell");
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: config.alpha });
      const hud = document.getElementById("hud");
      const variantLabel = document.getElementById("variantLabel");
      const frameLabel = document.getElementById("frameLabel");
      const dprLabel = document.getElementById("dprLabel");

      let frame = 0;
      let lastBacking = "";

      if (variant === "hud") {
        hud.classList.add("visible");
      }
      shell.classList.add(config.layout);
      if (config.bare) {
        shell.classList.add("bare");
      }
      if (config.sizing === "attribute") {
        canvas.classList.add("attribute-sized");
        canvas.setAttribute("width", String(config.attributeWidth));
        canvas.setAttribute("height", String(config.attributeHeight));
      } else if (config.layout === "small") {
        canvas.style.width = `${config.cssWidth}px`;
        canvas.style.height = `${config.cssHeight}px`;
      }
      variantLabel.textContent = variant;

      function configForVariant(name) {
        const base = {
          alpha: true,
          attributeWidth: 720,
          attributeHeight: 420,
          bare: false,
          backing: "css",
          backgroundMode: "gradient3",
          cssWidth: 720,
          cssHeight: 420,
          drawForeground: true,
          drawOrder: "background-first",
          foregroundDelayFrames: 0,
          layout: "full",
          loop: false,
          setTransform: true,
          sizing: "css",
        };
        const variants = {
          "static": {},
          "full-solid": { backgroundMode: "solid" },
          "full-transparent": { backgroundMode: "none" },
          "full-gradient-only": { drawForeground: false },
          "full-solid-only": { backgroundMode: "solid", drawForeground: false },
          "dpr": { backing: "dpr" },
          "animated": { loop: true },
          "hud": { backing: "dpr" },
          "small-static": { layout: "small" },
          "small-dpr": { layout: "small", backing: "dpr" },
          "small-attribute": { layout: "small", sizing: "attribute" },
          "alpha-false": { alpha: false },
          "dom-background": { backgroundMode: "none" },
          "dpr-no-transform": { backing: "dpr", setTransform: false },
        };
        const orderMatch = name.match(/^(dpr-)?(bare-)?(gradient2|gradient3|gradient)-(foreground-first|delayed-foreground)-size-(\d+)x(\d+)$/);
        if (orderMatch) {
          return {
            ...base,
            backing: orderMatch[1] ? "dpr" : "css",
            bare: Boolean(orderMatch[2]),
            backgroundMode: orderMatch[3] === "gradient2" ? "gradient2" : "gradient3",
            cssWidth: Number(orderMatch[5]),
            cssHeight: Number(orderMatch[6]),
            drawForeground: true,
            drawOrder: orderMatch[4] === "foreground-first" ? "foreground-first" : "background-first",
            foregroundDelayFrames: orderMatch[4] === "delayed-foreground" ? 1 : 0,
            layout: "small",
          };
        }
        const sizeMatch = name.match(/^(dpr-)?(bare-)?(?:(solid|transparent|gradient2|gradient3|gradient)(?:-(only))?-)?size-(\d+)x(\d+)$/);
        if (sizeMatch) {
          const mode = sizeMatch[3] || "gradient3";
          return {
            ...base,
            backing: sizeMatch[1] ? "dpr" : "css",
            bare: Boolean(sizeMatch[2]),
            backgroundMode: mode === "solid"
              ? "solid"
              : mode === "transparent"
                ? "none"
                : mode === "gradient2"
                  ? "gradient2"
                  : "gradient3",
            cssWidth: Number(sizeMatch[5]),
            cssHeight: Number(sizeMatch[6]),
            drawForeground: sizeMatch[4] !== "only",
            layout: "small",
          };
        }
        return { ...base, ...(variants[name] || {}) };
      }

      function cssSize() {
        const rect = canvas.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) {
          return {
            width: Math.max(1, Math.floor(rect.width)),
            height: Math.max(1, Math.floor(rect.height)),
          };
        }
        return {
          width: Math.max(1, Math.floor(window.innerWidth || document.documentElement.clientWidth || 1)),
          height: Math.max(1, Math.floor(window.innerHeight || document.documentElement.clientHeight || 1)),
        };
      }

      function backingScale() {
        return config.backing === "dpr" ? Math.max(1, window.devicePixelRatio || 1) : 1;
      }

      function resizeCanvas() {
        const size = cssSize();
        const scale = backingScale();
        const backingWidth = config.sizing === "attribute"
          ? config.attributeWidth
          : Math.max(1, Math.floor(size.width * scale));
        const backingHeight = config.sizing === "attribute"
          ? config.attributeHeight
          : Math.max(1, Math.floor(size.height * scale));
        const key = `${size.width}x${size.height}@${backingWidth}x${backingHeight}@${scale}`;
        if (key === lastBacking) return { ...size, scale };
        lastBacking = key;
        canvas.width = backingWidth;
        canvas.height = backingHeight;
        if (config.sizing !== "attribute") {
          canvas.style.width = `${size.width}px`;
          canvas.style.height = `${size.height}px`;
        }
        if (config.setTransform) {
          ctx.setTransform(scale, 0, 0, scale, 0, 0);
          return { width: size.width, height: size.height, scale };
        }
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        return { width: backingWidth, height: backingHeight, scale };
      }

      function drawGrid(width, height, t) {
        ctx.save();
        ctx.translate(width / 2, height / 2);
        ctx.rotate(-0.18);
        ctx.translate(-width / 2, -height / 2);
        ctx.strokeStyle = "rgba(45, 212, 191, 0.22)";
        ctx.lineWidth = 1;
        for (let x = -width; x <= width * 2; x += 72) {
          ctx.beginPath();
          ctx.moveTo(x + (t % 72), -height);
          ctx.lineTo(x + (t % 72), height * 2);
          ctx.stroke();
        }
        for (let y = -height; y <= height * 2; y += 72) {
          ctx.beginPath();
          ctx.moveTo(-width, y + (t % 72));
          ctx.lineTo(width * 2, y + (t % 72));
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBerry(x, y, r) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#f43f5e";
        ctx.strokeStyle = "#be123c";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 0.78, r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#22c55e";
        ctx.beginPath();
        ctx.moveTo(-r * 0.28, -r * 0.82);
        ctx.lineTo(0, -r * 1.25);
        ctx.lineTo(r * 0.24, -r * 0.82);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-r * 0.22, -r * 0.12, r * 0.1, 0, Math.PI * 2);
        ctx.arc(r * 0.22, -r * 0.12, r * 0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawCup(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = "#a5f3fc";
        ctx.fillStyle = "rgba(186, 230, 253, 0.42)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(-34, -44);
        ctx.lineTo(34, -44);
        ctx.lineTo(22, 44);
        ctx.lineTo(-22, 44);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "#fb7185";
        ctx.beginPath();
        ctx.moveTo(-18, -88);
        ctx.lineTo(-8, -46);
        ctx.stroke();
        ctx.restore();
      }

      function drawBackground(width, height) {
        if (config.backgroundMode === "gradient2" || config.backgroundMode === "gradient3") {
          const gradient = ctx.createLinearGradient(0, 0, width, height);
          gradient.addColorStop(0, "#ecfdf5");
          if (config.backgroundMode === "gradient3") {
            gradient.addColorStop(0.52, "#fff7ed");
          }
          gradient.addColorStop(1, "#eff6ff");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);
        } else if (config.backgroundMode === "solid") {
          ctx.fillStyle = "#ecfdf5";
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawForeground(width, height, t) {
        drawGrid(width, height, t);
        drawCup(width * 0.5 + Math.sin(frame / 18) * 42, height * 0.53);
        const positions = [
          [0.16, 0.15, 16],
          [0.84, 0.32, 18],
          [0.18, 0.82, 14],
          [0.54, 0.92, 17],
        ];
        for (const [px, py, r] of positions) {
          drawBerry(width * px + Math.sin(frame / 12 + px * 8) * 16, height * py, r);
        }
        ctx.fillStyle = "#fb7185";
        for (let i = 0; i < 12; i += 1) {
          ctx.beginPath();
          ctx.arc(width * (0.48 + i * 0.018), height * (0.55 + Math.sin(i + frame / 8) * 0.055), 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawScene() {
        const { width, height, scale } = resizeCanvas();
        const moving = config.loop;
        const t = moving ? frame * 1.6 : 0;
        const delayForeground = config.foregroundDelayFrames > 0 && frame < config.foregroundDelayFrames;
        ctx.clearRect(0, 0, width, height);
        if (config.drawOrder === "foreground-first" && config.drawForeground) {
          drawForeground(width, height, t);
          ctx.save();
          ctx.globalCompositeOperation = "destination-over";
          drawBackground(width, height);
          ctx.restore();
        } else {
          drawBackground(width, height);
          if (config.drawForeground && !delayForeground) {
            drawForeground(width, height, t);
          }
        }
        frame += 1;
        frameLabel.textContent = String(frame);
        dprLabel.textContent = String(scale);
        window.__saccadeCanvasRuntime = {
          fixture: "saccade-canvas-runtime-reduction-v0",
          variant,
          frame,
          cssWidth: width,
          cssHeight: height,
          backingWidth: canvas.width,
          backingHeight: canvas.height,
          backingScale: scale,
          canvas2d: "ok",
          config,
        };
        if (moving || delayForeground) {
          requestAnimationFrame(drawScene);
        }
      }

      window.addEventListener("resize", () => {
        lastBacking = "";
        drawScene();
      });
      drawScene();
    </script>
  </body>
</html>
