<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Safety Fixture</title>
  <link rel="stylesheet" href="login_handoff.css">
</head>
<body>
  <main>
    <h1>Safety Fixture</h1>
    <p id="session-state">Checking session...</p>

    <section aria-label="Human sensitive fields">
      <h2>Human fields</h2>
      <label for="ssn">SSN</label>
      <input
        id="ssn"
        data-saccade-field
        data-owner="human"
        data-sensitive="ssn"
        value="123-45-6789">

      <label for="government-id">Government ID</label>
      <input
        id="government-id"
        data-saccade-field
        data-owner="human"
        data-sensitive="government_id"
        value="ID-998877">

      <label for="credit-card">Credit card</label>
      <input
        id="credit-card"
        data-saccade-field
        data-owner="human"
        data-sensitive="credit_card"
        value="4111 1111 1111 1111">

      <label for="user-password">Password</label>
      <input
        id="user-password"
        type="password"
        data-saccade-field
        data-owner="human"
        data-sensitive="password"
        value="human-only-secret">

      <label for="tax-id-empty">Tax ID</label>
      <input
        id="tax-id-empty"
        data-saccade-field
        data-owner="human"
        data-sensitive="tax_id"
        value="">
    </section>

    <section aria-label="Agent fields">
      <h2>Agent fields</h2>
      <label for="agent-note">Agent note</label>
      <input
        id="agent-note"
        data-saccade-field
        data-owner="agent"
        data-sensitive="none"
        value="">

      <label for="agent-confirm">Agent confirmation</label>
      <input
        id="agent-confirm"
        type="checkbox"
        data-saccade-field
        data-owner="agent"
        data-sensitive="none">
    </section>
  </main>
  <script src="login_handoff.js"></script>
</body>
</html>
