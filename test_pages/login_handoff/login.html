<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link rel="stylesheet" href="login_handoff.css">
</head>
<body>
  <main>
    <h1>Human Login</h1>
    <form id="login-form">
      <label>
        Username
        <input id="username" name="username" autocomplete="username" value="wayne">
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password">
      </label>
      <label>
        One-time code
        <input id="otp" name="otp" inputmode="numeric" autocomplete="one-time-code">
      </label>
      <button type="submit">Log in</button>
    </form>
    <p id="status">Not logged in</p>
  </main>
  <script src="login_handoff.js"></script>
</body>
</html>
